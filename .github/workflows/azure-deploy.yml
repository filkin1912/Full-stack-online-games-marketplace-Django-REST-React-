name: Deploy to Azure

on:
  push:
    branches:
      - main
      - ci-test
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: Build and push backend image
        run: |
          ACR="${{ secrets.AZURE_ACR_NAME }}.azurecr.io"
          docker build \
            -t "${ACR}/gamesplay-backend:${IMAGE_TAG}" \
            -t "${ACR}/gamesplay-backend:latest" \
            ./backend
          docker push "${ACR}/gamesplay-backend:${IMAGE_TAG}"
          docker push "${ACR}/gamesplay-backend:latest"

      - name: Deploy backend to Container Apps
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          APP: ${{ secrets.AZURE_CONTAINER_APP_BACKEND }}
          ACR: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS: ${{ secrets.CSRF_TRUSTED_ORIGINS }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --image "${ACR}/gamesplay-backend:${IMAGE_TAG}" \
            --set-env-vars \
              "SECRET_KEY=${SECRET_KEY}" \
              "DEBUG=False" \
              "ALLOWED_HOSTS=${ALLOWED_HOSTS}" \
              "DATABASE_URL=${DATABASE_URL}" \
              "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}" \
              "CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}" \
              "CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}" \
              "CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}" \
              "CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}" \
              "AI_API_KEY=${AI_API_KEY}" \
              "PORT=8000"

      - name: Resolve backend URL
        id: backend
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          APP: ${{ secrets.AZURE_CONTAINER_APP_BACKEND }}
        run: |
          FQDN=$(az containerapp show \
            --name "$APP" \
            --resource-group "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "api_url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        run: |
          ACR="${{ secrets.AZURE_ACR_NAME }}.azurecr.io"
          docker build \
            --build-arg REACT_APP_API_URL="${{ steps.backend.outputs.api_url }}/" \
            -t "${ACR}/gamesplay-frontend:${IMAGE_TAG}" \
            -t "${ACR}/gamesplay-frontend:latest" \
            ./frontend_app
          docker push "${ACR}/gamesplay-frontend:${IMAGE_TAG}"
          docker push "${ACR}/gamesplay-frontend:latest"

      - name: Deploy frontend to Container Apps
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          APP: ${{ secrets.AZURE_CONTAINER_APP_FRONTEND }}
          ACR: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
        run: |
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --image "${ACR}/gamesplay-frontend:${IMAGE_TAG}"

      - name: Deployment summary
        run: |
          echo "Backend:  ${{ steps.backend.outputs.api_url }}"
          echo "Frontend: https://$(az containerapp show \
            --name '${{ secrets.AZURE_CONTAINER_APP_FRONTEND }}' \
            --resource-group '${{ secrets.AZURE_RESOURCE_GROUP }}' \
            --query 'properties.configuration.ingress.fqdn' -o tsv)"
