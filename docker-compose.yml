version: '3.9'

services:
  db:
    image: postgres:15
    container_name: project_dbcontainer
    environment:
      POSTGRES_DB: examdb
      POSTGRES_USER: examuser
      POSTGRES_PASSWORD: exampass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamesplay-backend
    entrypoint: [ "/app/entrypoint.sh" ]
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      SECRET_KEY: django-insecure-ol2x@g2v6!n_6jh$$5qh-fb$$75sdu214da^t=1bq&+7c!($$v+cg)
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,gamesplay-backend,0.0.0.0
      DB_NAME: examdb
      DB_USER: examuser
      DB_PASSWORD: exampass
      DB_HOST: db
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000
      SESSION_COOKIE_NAME: docker_sessionid
      PORT: "8000"
    volumes:
      - ./backend/mediafiles:/app/mediafiles

  frontend:
    build:
      context: ./frontend_app
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://127.0.0.1:8000/
    container_name: gamesplay-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: serve -s build -l 3000

volumes:
  postgres_data:
